name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Lint · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build
# Deploys happen on Vercel (its Git integration builds with NEXT_PUBLIC_API_URL
# from the project env) — this workflow only gates merges.
